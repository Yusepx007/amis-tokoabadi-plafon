name: amis_tokoabadi_plafon
description: "AMIS - Abadi Mobile-Commerce & Inventory System untuk Toko Abadi Plafon"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.7.0
  http: ^1.2.2

  # State Management
  flutter_riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI & Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # PDF & Sharing
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
